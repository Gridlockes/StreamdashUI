<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Stream Dash · Your streaming dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-base: #0b0813;
      --bg-deep: #050309;
      --ink: #f4f1ff;
      --ink-soft: rgba(244, 241, 255, 0.62);
      --ink-faint: rgba(244, 241, 255, 0.4);
      --accent-pink: #ff4fa8;
      --accent-violet: #8b5cf6;
      --accent-cyan: #22d3ee;
      --accent-amber: #fbbf24;
      --accent-lime: #a3e635;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-strong: rgba(255, 255, 255, 0.09);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-border-strong: rgba(255, 255, 255, 0.22);
      --radius-sm: 14px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.35);
      --shadow-glow: 0 20px 60px -20px rgba(139, 92, 246, 0.4);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html,
    body {
      background: var(--bg-base);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    .mesh {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      background: var(--bg-deep);
    }
    .mesh::before,
    .mesh::after,
    .mesh span {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.55;
      will-change: transform;
    }
    .mesh::before {
      width: 55vw;
      height: 55vw;
      background: var(--accent-violet);
      top: -10vw;
      left: -10vw;
      animation: drift1 22s ease-in-out infinite alternate;
    }
    .mesh::after {
      width: 45vw;
      height: 45vw;
      background: var(--accent-pink);
      bottom: -15vw;
      right: -10vw;
      animation: drift2 26s ease-in-out infinite alternate;
    }
    .mesh span {
      width: 40vw;
      height: 40vw;
      background: var(--accent-cyan);
      top: 30vh;
      right: 20vw;
      opacity: 0.35;
      animation: drift3 30s ease-in-out infinite alternate;
    }
    @keyframes drift1 {
      to { transform: translate(20vw, 15vh) rotate(120deg); }
    }
    @keyframes drift2 {
      to { transform: translate(-15vw, -20vh) rotate(-100deg); }
    }
    @keyframes drift3 {
      to { transform: translate(-25vw, 10vh) scale(1.2); }
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.07;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /></filter><rect width='100%25' height='100%25' filter='url(%23n)' /></svg>");
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 28px 80px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 56px;
      animation: fadeUp 0.8s var(--ease) both;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 4px;
    }
    .logo-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-violet) 60%, var(--accent-cyan));
      display: grid;
      place-items: center;
      box-shadow: 0 8px 24px -8px var(--accent-violet);
      position: relative;
    }
    .logo-mark::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 13px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), transparent 50%);
      pointer-events: none;
    }
    .logo-mark i {
      font-size: 1.1rem;
      color: white;
      position: relative;
      z-index: 1;
    }
    .logo-text h1 {
      font-family: "Instrument Serif", serif;
      font-size: 1.85rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .logo-text h1 em {
      font-style: italic;
      background: linear-gradient(120deg, var(--accent-pink), var(--accent-violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-text p {
      font-size: 0.72rem;
      color: var(--ink-faint);
      margin-top: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: stretch;
      gap: 16px;
    }

    .weather-widget {
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 18px 22px;
      min-width: 320px;
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }
    .weather-widget::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 50%);
      pointer-events: none;
    }
    .weather-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .weather-location {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
    }
    .weather-location i {
      color: var(--accent-pink);
      font-size: 0.78rem;
    }
    .weather-refresh {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      color: var(--ink);
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 0.78rem;
      transition: all 0.5s var(--ease);
    }
    .weather-refresh:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: rotate(180deg);
    }
    .weather-main {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .weather-icon {
      font-size: 2.6rem;
      background: linear-gradient(135deg, var(--accent-amber), var(--accent-pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 4px 12px rgba(255, 79, 168, 0.3));
    }
    .weather-readings {
      flex: 1;
    }
    .weather-temp {
      font-family: "Instrument Serif", serif;
      font-size: 2.6rem;
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }
    .weather-temp sup {
      font-size: 1rem;
      color: var(--ink-soft);
      vertical-align: top;
      margin-left: 2px;
    }
    .weather-condition {
      font-size: 0.82rem;
      color: var(--ink-soft);
      margin-top: 4px;
    }
    .weather-meta {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--glass-border);
      font-size: 0.74rem;
      color: var(--ink-faint);
    }
    .weather-meta span strong {
      color: var(--ink);
      font-weight: 500;
      margin-left: 4px;
    }

    .hero {
      margin-bottom: 48px;
      animation: fadeUp 0.8s 0.1s var(--ease) both;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--ink-soft);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 6px 14px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      backdrop-filter: blur(12px);
      margin-bottom: 18px;
    }
    .hero-eyebrow .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-lime);
      box-shadow: 0 0 12px var(--accent-lime);
    }
    .hero h2 {
      font-family: "Instrument Serif", serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.025em;
      max-width: 760px;
    }
    .hero h2 em {
      font-style: italic;
      background: linear-gradient(120deg, var(--accent-pink) 20%, var(--accent-violet) 60%, var(--accent-cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .section-head h3 {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .section-head .count {
      font-family: "Instrument Serif", serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--ink-faint);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
    }

    .service-card {
      --c: var(--accent-violet);
      position: relative;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 22px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-decoration: none;
      color: var(--ink);
      overflow: hidden;
      transition: transform 0.5s var(--ease), border-color 0.4s var(--ease), box-shadow 0.5s var(--ease);
      animation: fadeUp 0.7s var(--card-delay, 0s) var(--ease) both;
      isolation: isolate;
    }
    .service-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 0%, color-mix(in srgb, var(--c) 28%, transparent), transparent 60%);
      opacity: 0.5;
      transition: opacity 0.5s var(--ease);
      z-index: -1;
    }
    .service-card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--c) 60%, transparent), transparent);
      opacity: 0.6;
    }
    .service-card:hover {
      transform: translateY(-6px);
      border-color: color-mix(in srgb, var(--c) 40%, var(--glass-border));
      box-shadow: 0 20px 50px -20px color-mix(in srgb, var(--c) 50%, transparent);
    }
    .service-card:hover::before {
      opacity: 0.9;
    }
    .service-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 1.3rem;
      background: color-mix(in srgb, var(--c) 18%, transparent);
      color: var(--c);
      border: 1px solid color-mix(in srgb, var(--c) 25%, transparent);
      transition: transform 0.5s var(--ease);
    }
    .service-card:hover .service-icon {
      transform: scale(1.08) rotate(-3deg);
    }
    .service-icon svg {
      width: 60%;
      height: 60%;
      display: block;
    }
    .service-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .service-name {
      font-weight: 500;
      font-size: 0.98rem;
      letter-spacing: -0.01em;
    }
    .service-tag {
      font-size: 0.72rem;
      color: var(--ink-faint);
      letter-spacing: 0.02em;
    }
    .service-arrow {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      display: grid;
      place-items: center;
      font-size: 0.7rem;
      color: var(--ink-soft);
      opacity: 0;
      transform: translate(-4px, 4px);
      transition: all 0.4s var(--ease);
    }
    .service-card:hover .service-arrow {
      opacity: 1;
      transform: translate(0, 0);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.12);
    }

    /* ----- TRENDING SECTION (Netflix style) ----- */
    .trending-section {
      margin-top: 64px;
      animation: fadeUp 0.9s 0.3s var(--ease) both;
    }

    .nf-row {
      position: relative;
    }
    /* edge fades */
    .nf-row::before,
    .nf-row::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 48px;
      pointer-events: none;
      z-index: 6;
    }
    .nf-row::before { left: 0; background: linear-gradient(to right, var(--bg-base), transparent); }
    .nf-row::after { right: 0; background: linear-gradient(to left, var(--bg-base), transparent); }

    .nf-track {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x proximity;
      scroll-behavior: smooth;
      padding: 40px 8px;
      scrollbar-width: none;
    }
    .nf-track::-webkit-scrollbar { display: none; }

    .nf-card {
      position: relative;
      flex: 0 0 auto;
      width: 188px;
      aspect-ratio: 2 / 3;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      background-size: cover;
      background-position: center;
      background-color: var(--glass-strong);
      scroll-snap-align: start;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
      transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
    }
    .nf-card:hover {
      transform: scale(1.13);
      z-index: 5;
      box-shadow: 0 26px 54px -14px rgba(0, 0, 0, 0.75);
    }

    .nf-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      color: rgba(255, 255, 255, 0.85);
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.5));
    }

    .nf-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 30px 12px 12px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.94) 12%, rgba(0, 0, 0, 0.55) 55%, transparent);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
    }
    .nf-card:hover .nf-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .nf-badge-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .nf-type {
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--accent-pink);
      color: #fff;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
    }
    .nf-genre {
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.72);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .nf-title {
      font-weight: 600;
      font-size: 0.92rem;
      line-height: 1.18;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .nf-platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .nf-plat {
      font-size: 0.58rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 2px 8px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nf-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 7;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--glass-border);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.3s var(--ease), background 0.3s var(--ease);
    }
    .nf-row:hover .nf-nav { opacity: 1; }
    .nf-nav:hover { background: rgba(0, 0, 0, 0.85); }
    .nf-nav.prev { left: 4px; }
    .nf-nav.next { right: 4px; }
    @media (hover: none) {
      .nf-nav { display: none; }
    }

    .loading-dots {
      display: inline-flex;
      gap: 4px;
    }
    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-pink);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    .error-state {
      padding: 16px 0;
      color: var(--ink-soft);
      font-size: 0.85rem;
    }
    .retry-btn {
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      border: 1px solid var(--glass-border);
      padding: 8px 14px;
      border-radius: 100px;
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .retry-btn:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: var(--glass-border-strong);
    }

    footer {
      margin-top: 80px;
      padding-top: 32px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.78rem;
      color: var(--ink-faint);
    }
    footer em {
      font-family: "Instrument Serif", serif;
      font-style: italic;
      color: var(--ink-soft);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      header { flex-direction: column; align-items: stretch; }
      .header-right { justify-content: space-between; }
      .weather-widget { min-width: 0; flex: 1; }
    }
    @media (max-width: 560px) {
      .container { padding: 20px 18px 60px; }
      .services-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .service-card { padding: 18px 14px; }
      .weather-meta { flex-wrap: wrap; gap: 10px; }
      footer { flex-direction: column; text-align: center; }
      .nf-card { width: 140px; }
      .nf-track { padding: 28px 4px; }
    }
  </style>
</head>
<body>
<div class="mesh"><span></span></div>
<div class="grain"></div>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-mark"><i class="fas fa-play"></i></div>
      <div class="logo-text">
        <h1>Stream<em>Dash</em></h1>
        <p>Everything in one place</p>
      </div>
    </div>
    <div class="header-right">
      <div class="weather-widget" id="weather-widget">
        <div class="weather-top">
          <div class="weather-location"><i class="fas fa-location-dot"></i> <span id="weather-location-name">Locating…</span></div>
          <button class="weather-refresh" onclick="fetchWeather()" aria-label="Refresh weather"><i class="fas fa-arrows-rotate"></i></button>
        </div>
        <div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div><span>Fetching weather…</span></div>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-eyebrow"><span class="dot"></span> <span id="time-greeting">Welcome back</span></div>
    <h2>What are you in the <em>mood</em> for tonight?</h2>
  </section>

  <section>
    <div class="section-head">
      <h3>Your Streaming Services</h3>
      <span class="count"><em>eleven</em> available</span>
    </div>
    <div class="services-grid" id="services-grid"></div>
  </section>

  <!-- NEW: Trending movies & TV shows section -->
  <section class="trending-section">
    <div class="section-head">
      <h3>Trending now · movies & tv</h3>
      <span class="count"><em>across platforms</em></span>
    </div>
    <div id="trending-container">
      <div class="loading" style="padding: 24px 0;">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <span>Loading trending titles…</span>
      </div>
    </div>
  </section>

  <footer>
    <div>© <span id="year"></span> Stream Dash. Your central hub for all streaming.</div>
    <div>by <em>Gridlantis.org</em></div>
  </footer>
</div>

<script>
  (function() {
    // ----- Services data -----
    const services = [
      { name: "Netflix", tag: "Originals & films", svg: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M5.398 0v.006c3.028 8.556 5.37 15.175 8.348 23.596 2.344.058 4.85.398 4.854.398-2.8-7.924-5.923-16.747-8.487-24zm8.489 0v9.63L18.6 22.951c-.043-7.86-.004-15.913.002-22.95zM5.398 1.05V24c1.873-.225 2.81-.312 4.715-.398v-9.22z"/></svg>`, color: "#e50914", url: "https://netflix.com" },
      { name: "YouTube", tag: "Videos & live", icon: "fab fa-youtube", color: "#ff3d3d", url: "https://youtube.com" },
      { name: "Prime Video", tag: "Amazon", icon: "fab fa-amazon", color: "#00a8e1", url: "https://www.amazon.com/Amazon-Video/b/?&node=2858778011" },
      { name: "Hulu", tag: "TV & exclusives", icon: "fas fa-tv", color: "#1ce783", url: "https://hulu.com" },
      { name: "Disney+", tag: "Family & Marvel", icon: "fa-solid fa-castle", color: "#5b8df7", url: "https://disneyplus.com" },
      { name: "HBO Max", tag: "Premium series", svg: `<svg viewBox="0 0 80 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g fill="currentColor"><path d="M3 8h4v6h4V8h4v16h-4v-6H7v6H3z"/><path d="M22 8h6c3 0 5 1.5 5 4 0 1.5-.8 2.6-2 3.2 1.5.5 2.5 1.8 2.5 3.6 0 3-2.2 5.2-5.8 5.2H22zm4 6.2h2c1.2 0 1.9-.6 1.9-1.6 0-.9-.7-1.5-1.9-1.5h-2zm0 6.5h2.2c1.4 0 2.2-.7 2.2-1.8 0-1.1-.8-1.8-2.2-1.8H26z"/><circle cx="44" cy="16" r="8"/><path d="M58 8h4l3 5 3-5h4v16h-4v-9l-3 5-3-5v9h-4z"/></g></svg>`, color: "#a855f7", url: "https://hbomax.com" },
      { name: "Apple TV+", tag: "Originals", icon: "fab fa-apple", color: "#e5e5e5", url: "https://tv.apple.com" },
      { name: "Crunchyroll", tag: "Anime", svg: `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M16 2C8.27 2 2 8.27 2 16s6.27 14 14 14 14-6.27 14-14S23.73 2 16 2zm0 25.5c-6.35 0-11.5-5.15-11.5-11.5S9.65 4.5 16 4.5c2.07 0 4.01.55 5.69 1.5-.56-.13-1.14-.2-1.74-.2-4.42 0-8 3.58-8 8s3.58 8 8 8c.6 0 1.18-.07 1.74-.2-1.68.95-3.62 1.5-5.69 1.5z"/><circle fill="currentColor" cx="22" cy="11" r="2.2"/></svg>`, color: "#f47521", url: "https://crunchyroll.com" },
      { name: "Pluto TV", tag: "Free live TV", icon: "fas fa-satellite-dish", color: "#ff6ad5", url: "https://pluto.tv" },
      { name: "Plex", tag: "Your library", icon: "fas fa-server", color: "#fbbf24", url: "https://watch.plex.tv/live-tv" },
      { name: "Tubi", tag: "Free movies", icon: "fas fa-film", color: "#a78bfa", url: "https://tubitv.com" },
    ];

    const grid = document.getElementById('services-grid');
    grid.innerHTML = services.map((s, i) => `
      <a href="${s.url}" target="_blank" rel="noopener" class="service-card" style="--c: ${s.color}; --card-delay: ${0.2 + i * 0.04}s">
        <div class="service-arrow"><i class="fas fa-arrow-up-right-from-square"></i></div>
        <div class="service-icon">${s.svg ? s.svg : `<i class="${s.icon}"></i>`}</div>
        <div class="service-meta">
          <span class="service-name">${s.name}</span>
          <span class="service-tag">${s.tag}</span>
        </div>
      </a>
    `).join('');

    // Time greeting & year
    const hr = new Date().getHours();
    const greet = hr < 5 ? "Burning the midnight oil" : hr < 12 ? "Good morning" : hr < 17 ? "Good afternoon" : hr < 22 ? "Good evening" : "Late night vibes";
    document.getElementById('time-greeting').textContent = greet;
    document.getElementById('year').textContent = new Date().getFullYear();

    // ----- Weather (uses the visitor's location) -----
    const weatherWidget = document.getElementById('weather-widget');
    const WEATHER_GOV_BASE = 'https://api.weather.gov';
    const weatherIcons = {
      sunny: 'fas fa-sun', clear: 'fas fa-moon', 'mostly sunny': 'fas fa-cloud-sun', 'partly sunny': 'fas fa-cloud-sun',
      'partly cloudy': 'fas fa-cloud-sun', 'mostly cloudy': 'fas fa-cloud', cloudy: 'fas fa-cloud', overcast: 'fas fa-cloud',
      fog: 'fas fa-smog', rain: 'fas fa-cloud-rain', showers: 'fas fa-cloud-showers-heavy', thunderstorm: 'fas fa-bolt',
      snow: 'fas fa-snowflake', ice: 'fas fa-icicles', windy: 'fas fa-wind', haze: 'fas fa-smog', smoke: 'fas fa-smog'
    };

    function setLocationName(text) {
      const el = document.getElementById('weather-location-name');
      if (el) el.textContent = text;
    }

    // Ask the browser for the visitor's coordinates.
    function getPosition(timeoutMs = 9000) {
      return new Promise((resolve, reject) => {
        if (!('geolocation' in navigator)) return reject(new Error('Geolocation not supported'));
        navigator.geolocation.getCurrentPosition(
          pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
          err => reject(err),
          { enableHighAccuracy: false, timeout: timeoutMs, maximumAge: 600000 }
        );
      });
    }

    window.fetchWeather = async function() {
      const topRow = weatherWidget.querySelector('.weather-top');
      // Clear everything after the top row (elements AND whitespace text nodes).
      while (topRow.nextSibling) topRow.nextSibling.remove();
      topRow.insertAdjacentHTML('afterend', `<div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div><span>Fetching weather…</span></div>`);

      const withTimeout = (url, ms = 8000) => {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), ms);
        return fetch(url, { signal: ctrl.signal, headers: { 'Accept': 'application/geo+json' } })
          .finally(() => clearTimeout(t));
      };

      // 1) Get the visitor's coordinates.
      let coords;
      try {
        setLocationName('Locating…');
        coords = await getPosition();
      } catch (e) {
        setLocationName('Location off');
        renderWeatherError('Allow location access to see local weather.');
        return;
      }

      // 2) Resolve a forecast for those coordinates (US National Weather Service).
      try {
        const pointsRes = await withTimeout(`${WEATHER_GOV_BASE}/points/${coords.lat.toFixed(4)},${coords.lon.toFixed(4)}`);
        if (!pointsRes.ok) throw new Error('points');
        const points = await pointsRes.json();

        const rel = points.properties && points.properties.relativeLocation && points.properties.relativeLocation.properties;
        setLocationName(rel && rel.city ? `${rel.city}, ${rel.state}` : 'Your area');

        const forecastRes = await withTimeout(points.properties.forecast);
        if (!forecastRes.ok) throw new Error('forecast');
        const forecast = await forecastRes.json();
        renderWeather(forecast.properties.periods[0]);
      } catch (e) {
        console.error(e);
        renderWeatherError('Weather unavailable for your location (US forecasts only).');
      }
    };

    function renderWeather(w) {
      const cond = (w.shortForecast || '').toLowerCase();
      let icon = 'fas fa-cloud';
      for (const [k, v] of Object.entries(weatherIcons)) {
        if (cond.includes(k)) { icon = v; break; }
      }
      const top = weatherWidget.querySelector('.weather-top');
      while (top.nextSibling) top.nextSibling.remove();
      top.insertAdjacentHTML('afterend', `
        <div class="weather-main">
          <div class="weather-icon"><i class="${icon}"></i></div>
          <div class="weather-readings">
            <div class="weather-temp">${w.temperature}<sup>°${w.temperatureUnit}</sup></div>
            <div class="weather-condition">${w.shortForecast}</div>
          </div>
        </div>
        <div class="weather-meta">
          <span>Wind<strong>${w.windSpeed || '—'}</strong></span>
          <span>Dir<strong>${w.windDirection || '—'}</strong></span>
          <span>${w.isDaytime ? 'Day' : 'Night'}<strong>${w.isDaytime ? '☀' : '☾'}</strong></span>
        </div>
      `);
    }

    function renderWeatherError(msg) {
      const top = weatherWidget.querySelector('.weather-top');
      while (top.nextSibling) top.nextSibling.remove();
      top.insertAdjacentHTML('afterend', `<div class="error-state"><div>${msg}</div><button class="retry-btn" onclick="fetchWeather()"><i class="fas fa-rotate-right"></i> Try again</button></div>`);
    }

    // ----- TRENDING CONTENT (real titles, June 2026) -----
    // `wiki` is the exact Wikipedia article title used to fetch a real poster
    // thumbnail at runtime. `bg`/`posterIcon` are the fallback shown until (or
    // unless) the poster loads.
    const trendingData = [
      {
        title: "Avatar: Fire and Ash",
        type: "movie",
        platforms: ["Disney+"],
        genre: "Sci‑fi epic",
        wiki: "Avatar: Fire and Ash",
        posterIcon: "fa-solid fa-fire",
        bg: "linear-gradient(135deg, #0f172a, #1e3a8a)"
      },
      {
        title: "Hoppers",
        type: "movie",
        platforms: ["Disney+"],
        genre: "Animated comedy",
        wiki: "Hoppers (film)",
        posterIcon: "fa-solid fa-otter",
        bg: "linear-gradient(135deg, #065f46, #059669)"
      },
      {
        title: "Office Romance",
        type: "movie",
        platforms: ["Netflix"],
        genre: "Romantic comedy",
        wiki: "Office Romance (2026 film)",
        posterIcon: "fa-solid fa-heart",
        bg: "linear-gradient(135deg, #9d174d, #db2777)"
      },
      {
        title: "Wallace & Gromit: Vengeance Most Fowl",
        type: "movie",
        platforms: ["Netflix"],
        genre: "Animated adventure",
        wiki: "Wallace & Gromit: Vengeance Most Fowl",
        posterIcon: "fa-solid fa-cheese",
        bg: "linear-gradient(135deg, #b45309, #d97706)"
      },
      {
        title: "House of the Dragon",
        type: "tv",
        platforms: ["HBO Max"],
        genre: "Fantasy drama",
        wiki: "House of the Dragon",
        posterIcon: "fa-solid fa-dragon",
        bg: "linear-gradient(135deg, #4c1d95, #7e22ce)"
      },
      {
        title: "Voicemails for Isabelle",
        type: "movie",
        platforms: ["Netflix"],
        genre: "Comedy drama",
        wiki: "Voicemails for Isabelle",
        posterIcon: "fa-solid fa-voicemail",
        bg: "linear-gradient(135deg, #1e1b4b, #312e81)"
      }
    ];

    function platformIcon(p) {
      if (p.includes('Netflix')) return 'fa-solid fa-n';
      if (p.includes('YouTube')) return 'fab fa-youtube';
      if (p.includes('Prime')) return 'fab fa-amazon';
      if (p.includes('Hulu')) return 'fa-solid fa-h';
      if (p.includes('Disney')) return 'fa-solid fa-castle';
      if (p.includes('HBO')) return 'fa-solid fa-maximize';
      if (p.includes('Apple')) return 'fab fa-apple';
      if (p.includes('Crunchyroll')) return 'fa-solid fa-dragon';
      if (p.includes('Pluto')) return 'fa-solid fa-satellite-dish';
      if (p.includes('Plex')) return 'fa-solid fa-server';
      if (p.includes('Tubi')) return 'fa-solid fa-film';
      return 'fa-solid fa-tv';
    }

    function renderTrending() {
      const container = document.getElementById('trending-container');
      if (!container) return;

      let cards = '';
      trendingData.forEach((item, i) => {
        const platformTags = item.platforms
          .map(p => `<span class="nf-plat"><i class="${platformIcon(p)}"></i> ${p}</span>`)
          .join('');

        cards += `
          <div class="nf-card" id="poster-${i}" style="background-image: ${item.bg};" title="${item.title}">
            <div class="nf-fallback"><i class="${item.posterIcon}"></i></div>
            <div class="nf-overlay">
              <div class="nf-badge-row">
                <span class="nf-type">${item.type === 'movie' ? 'Movie' : 'Series'}</span>
                <span class="nf-genre">${item.genre}</span>
              </div>
              <div class="nf-title">${item.title}</div>
              <div class="nf-platforms">${platformTags}</div>
            </div>
          </div>
        `;
      });

      container.innerHTML = `
        <div class="nf-row">
          <button class="nf-nav prev" aria-label="Scroll left"><i class="fas fa-chevron-left"></i></button>
          <div class="nf-track" id="nf-track">${cards}</div>
          <button class="nf-nav next" aria-label="Scroll right"><i class="fas fa-chevron-right"></i></button>
        </div>
      `;

      // Wire up the scroll arrows.
      const track = document.getElementById('nf-track');
      const scrollBy = () => Math.max(track.clientWidth * 0.8, 200);
      const prev = container.querySelector('.nf-nav.prev');
      const next = container.querySelector('.nf-nav.next');
      if (prev) prev.addEventListener('click', () => track.scrollBy({ left: -scrollBy(), behavior: 'smooth' }));
      if (next) next.addEventListener('click', () => track.scrollBy({ left: scrollBy(), behavior: 'smooth' }));

      // Progressively swap in real poster art. Each title is fetched
      // independently so one failure never blocks the others; on any failure
      // the gradient + icon placeholder simply stays.
      hydrateTrendingPosters();
    }

    async function hydrateTrendingPosters() {
      const WIKI_API = 'https://en.wikipedia.org/w/api.php';
      await Promise.all(trendingData.map(async (item, i) => {
        if (!item.wiki) return;
        const params = new URLSearchParams({
          action: 'query', format: 'json', prop: 'pageimages',
          piprop: 'thumbnail', pithumbsize: '600', redirects: '1',
          titles: item.wiki, origin: '*'
        });
        try {
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), 8000);
          const res = await fetch(`${WIKI_API}?${params}`, { signal: ctrl.signal })
            .finally(() => clearTimeout(t));
          if (!res.ok) return;
          const data = await res.json();
          const pages = data && data.query && data.query.pages;
          if (!pages) return;
          const page = Object.values(pages)[0];
          const src = page && page.thumbnail && page.thumbnail.source;
          if (!src) return;

          // Preload, then swap so we never flash a broken image.
          await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = resolve;
            img.onerror = reject;
            img.src = src;
          });
          const posterEl = document.getElementById(`poster-${i}`);
          if (posterEl) {
            posterEl.style.backgroundImage = `url("${src}")`;
            posterEl.style.backgroundColor = '#000';
            const fallback = posterEl.querySelector('.nf-fallback');
            if (fallback) fallback.style.display = 'none';
          }
        } catch (e) {
          /* keep the gradient fallback */
        }
      }));
    }

    // Initialize directly. This script sits at the bottom of <body>, so every
    // element it touches already exists — no need to wait on DOMContentLoaded
    // (which may have already fired before this code runs). The services grid
    // above renders the same way, which is why it always worked.
    renderTrending();
    fetchWeather();

  })();
</script>

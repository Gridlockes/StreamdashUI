<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamHub - Your Streaming Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      :root {
        --primary: #6a11cb;
        --secondary: #2575fc;
        --dark: #121212;
        --darker: #0a0a0a;
        --light: #f5f5f5;
        --gray: #2a2a2a;
        --card-bg: rgba(255, 255, 255, 0.05);
        --transition: all 0.3s ease;
      }

      body {
        background: linear-gradient(135deg, var(--darker), var(--dark));
        color: var(--light);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      /* Header Styles */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        margin-bottom: 40px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo i {
        font-size: 2.2rem;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .logo h1 {
        font-size: 1.8rem;
        font-weight: 700;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .user-profile {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .user-avatar {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor: pointer;
      }

      /* Weather Widget */
      .weather-widget {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        min-width: 250px;
        text-align: center;
      }

      .weather-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .weather-title {
        font-size: 1rem;
        color: #aaa;
        font-weight: 600;
      }

      .weather-refresh {
        background: none;
        border: none;
        color: var(--secondary);
        cursor: pointer;
        font-size: 1rem;
        transition: var(--transition);
      }

      .weather-refresh:hover {
        transform: rotate(180deg);
      }

      .weather-location {
        font-size: 1.1rem;
        color: var(--secondary);
        font-weight: 600;
        margin-bottom: 15px;
      }

      .weather-main {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 15px;
      }

      .weather-icon {
        font-size: 3rem;
        color: var(--secondary);
      }

      .weather-temp {
        font-size: 2.5rem;
        font-weight: 700;
      }

      .weather-condition {
        font-size: 1.1rem;
        color: #ccc;
        margin-bottom: 15px;
        font-weight: 500;
      }

      .weather-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        font-size: 0.9rem;
        color: #aaa;
      }

      .weather-detail {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 8px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
      }

      .weather-detail i {
        font-size: 1.2rem;
        margin-bottom: 5px;
        color: var(--secondary);
      }

      /* Services Section */
      .services-section {
        margin-bottom: 40px;
      }

      .section-title {
        font-size: 1.5rem;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .section-title i {
        color: var(--secondary);
      }

      .services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 20px;
      }

      .service-card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 25px 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        transition: var(--transition);
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-decoration: none;
        color: var(--light);
      }

      .service-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .service-icon {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        transition: var(--transition);
      }

      .service-card:hover .service-icon {
        transform: scale(1.1);
      }

      .service-name {
        font-weight: 600;
        font-size: 0.95rem;
        text-align: center;
        line-height: 1.3;
      }

      /* Loading State */
      .loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        text-align: center;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 255, 255, 0.1);
        border-top: 5px solid var(--secondary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loading p {
        color: #aaa;
        font-size: 1.1rem;
      }

      /* Error State */
      .error-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        text-align: center;
        background: var(--card-bg);
        border-radius: 12px;
        border: 2px dashed rgba(255, 255, 255, 0.1);
      }

      .error-state i {
        font-size: 3rem;
        color: rgba(255, 255, 255, 0.2);
        margin-bottom: 15px;
      }

      .error-state h3 {
        font-size: 1.3rem;
        margin-bottom: 10px;
        color: rgba(255, 255, 255, 0.7);
      }

      .error-state p {
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 20px;
        max-width: 400px;
      }

      .retry-btn {
        background: var(--secondary);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .retry-btn:hover {
        background: var(--primary);
        transform: translateY(-2px);
      }

      /* Footer */
      footer {
        margin-top: 50px;
        text-align: center;
        padding: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 0.9rem;
        color: #aaa;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        .services-grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        }

        .header-right {
          flex-direction: column;
          gap: 15px;
        }

        .weather-widget {
          min-width: 200px;
        }

        .weather-main {
          gap: 15px;
        }

        .weather-icon {
          font-size: 2.5rem;
        }

        .weather-temp {
          font-size: 2rem;
        }

        .service-card {
          padding: 20px 10px;
        }

        .service-icon {
          width: 55px;
          height: 55px;
          font-size: 1.5rem;
        }

        .service-name {
          font-size: 0.9rem;
        }
      }

      @media (max-width: 480px) {
        header {
          flex-direction: column;
          gap: 20px;
          text-align: center;
        }

        .services-grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 15px;
        }

        .weather-details {
          grid-template-columns: 1fr;
        }

        .service-card {
          padding: 15px 8px;
        }

        .service-icon {
          width: 50px;
          height: 50px;
          font-size: 1.4rem;
        }

        .service-name {
          font-size: 0.85rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <i class="fas fa-play-circle"></i>
          <h1>Netflix</h1>
        </div>
        <div class="header-right">
          <div class="weather-widget" id="weather-widget">
            <div class="weather-header">
              <div class="weather-title">Current Weather</div>
              <button class="weather-refresh" onclick="fetchDetroitWeather()">
                <i class="fas fa-sync-alt"></i>
              </button>
            </div>
            <div class="weather-location">Detroit, MI</div>
            <div class="loading">
              <div class="loading-spinner"></div>
              <p>Loading Detroit weather...</p>
            </div>
          </div>
          <div class="user-profile">
            <div class="user-avatar">JS</div>
          </div>
        </div>
      </header>

      <main>
        <section class="services-section">
          <h2 class="section-title">
            <i class="fas fa-tv"></i> Your Streaming Services
          </h2>
          <div class="services-grid">
            <!-- Netflix -->
            <a
              href="https://netflix.com"
              target="_blank"
              class="service-card"
              style="--service-color: #e50914"
            >
              <div
                class="service-icon"
                style="background-color: rgba(229, 9, 20, 0.2); color: #e50914"
              >
                <i class="fab fa-netflix"></i>
              </div>
              <span class="service-name">Netflix</span>
            </a>

            <!-- YouTube -->
            <a
              href="https://youtube.com"
              target="_blank"
              class="service-card"
              style="--service-color: #ff0000"
            >
              <div
                class="service-icon"
                style="background-color: rgba(255, 0, 0, 0.2); color: #ff0000"
              >
                <i class="fab fa-youtube"></i>
              </div>
              <span class="service-name">YouTube</span>
            </a>

            <!-- Amazon Prime -->
            <a
              href="https://www.amazon.com/Amazon-Video/b/?&node=2858778011&ref=dvm_MLP_ROWNA_US_1"
              target="_blank"
              class="service-card"
              style="--service-color: #00a8e1"
            >
              <div
                class="service-icon"
                style="background-color: rgba(0, 168, 225, 0.2); color: #00a8e1"
              >
                <i class="fab fa-amazon"></i>
              </div>
              <span class="service-name">Amazon Prime</span>
            </a>

            <!-- Hulu -->
            <a
              href="https://hulu.com"
              target="_blank"
              class="service-card"
              style="--service-color: #1ce783"
            >
              <div
                class="service-icon"
                style="
                  background-color: rgba(28, 231, 131, 0.2);
                  color: #1ce783;
                "
              >
                <i class="fas fa-tv"></i>
              </div>
              <span class="service-name">Hulu</span>
            </a>

            <!-- Disney+ -->
            <a
              href="https://disneyplus.com"
              target="_blank"
              class="service-card"
              style="--service-color: #113ccf"
            >
              <div
                class="service-icon"
                style="background-color: rgba(17, 60, 207, 0.2); color: #113ccf"
              >
                <i class="fas fa-crown"></i>
              </div>
              <span class="service-name">Disney+</span>
            </a>

            <!-- HBO Max -->
            <a
              href="https://hbomax.com"
              target="_blank"
              class="service-card"
              style="--service-color: #821bf0"
            >
              <div
                class="service-icon"
                style="
                  background-color: rgba(130, 27, 240, 0.2);
                  color: #821bf0;
                "
              >
                <i class="fab fa-hbo"></i>
              </div>
              <span class="service-name">HBO Max</span>
            </a>

            <!-- Apple TV+ -->
            <a
              href="https://tv.apple.com"
              target="_blank"
              class="service-card"
              style="--service-color: #000000"
            >
              <div
                class="service-icon"
                style="background-color: rgba(0, 0, 0, 0.2); color: #ffffff"
              >
                <i class="fab fa-apple"></i>
              </div>
              <span class="service-name">Apple TV+</span>
            </a>

            <!-- Crunchyroll -->
            <a
              href="https://crunchyroll.com"
              target="_blank"
              class="service-card"
              style="--service-color: #ff6b00"
            >
              <div
                class="service-icon"
                style="background-color: rgba(255, 107, 0, 0.2); color: #ff6b00"
              >
                <i class="fas fa-dragon"></i>
              </div>
              <span class="service-name">Crunchyroll</span>
            </a>

            <!-- Pluto TV -->
            <a
              href="https://pluto.tv"
              target="_blank"
              class="service-card"
              style="--service-color: #ff66cc"
            >
              <div
                class="service-icon"
                style="
                  background-color: rgba(255, 102, 204, 0.2);
                  color: #ff66cc;
                "
              >
                <i class="fas fa-satellite-dish"></i>
              </div>
              <span class="service-name">Pluto TV</span>
            </a>

            <!-- Plex -->
            <a
              href="https://watch.plex.tv/live-tv"
              target="_blank"
              class="service-card"
              style="--service-color: #e5a00d"
            >
              <div
                class="service-icon"
                style="
                  background-color: rgba(229, 160, 13, 0.2);
                  color: #e5a00d;
                "
              >
                <i class="fas fa-server"></i>
              </div>
              <span class="service-name">Plex</span>
            </a>

            <!-- Tubi -->
            <a
              href="https://tubitv.com"
              target="_blank"
              class="service-card"
              style="--service-color: #7b68ee"
            >
              <div
                class="service-icon"
                style="
                  background-color: rgba(123, 104, 238, 0.2);
                  color: #7b68ee;
                "
              >
                <i class="fas fa-film"></i>
              </div>
              <span class="service-name">Tubi</span>
            </a>
          </div>
        </section>
      </main>

      <footer>
        <p>Your Central Hub for All Streaming Services</p>
        <p style="margin-top: 10px; font-size: 0.8rem">
          Weather data provided by Weather.gov for Detroit, MI
        </p>
      </footer>
    </div>

    <script>
      // DOM Elements
      const weatherWidget = document.getElementById("weather-widget");

      // Weather.gov API configuration (no API key required)
      const WEATHER_GOV_BASE_URL = "https://api.weather.gov";

      // Detroit coordinates
      const DETROIT_COORDINATES = {
        lat: 42.3314,
        lon: -83.0458,
      };

      // Weather icon mapping for Weather.gov conditions
      const weatherIcons = {
        sunny: "fas fa-sun",
        clear: "fas fa-moon",
        "mostly sunny": "fas fa-cloud-sun",
        "partly sunny": "fas fa-cloud-sun",
        "partly cloudy": "fas fa-cloud-sun",
        "mostly cloudy": "fas fa-cloud",
        cloudy: "fas fa-cloud",
        overcast: "fas fa-cloud",
        fog: "fas fa-smog",
        rain: "fas fa-cloud-rain",
        showers: "fas fa-cloud-showers-heavy",
        thunderstorm: "fas fa-bolt",
        snow: "fas fa-snowflake",
        ice: "fas fa-icicles",
        windy: "fas fa-wind",
        haze: "fas fa-smog",
        smoke: "fas fa-smog",
      };

      // Initialize the dashboard
      function initDashboard() {
        fetchDetroitWeather();
      }

      // Fetch weather data for Detroit from Weather.gov API
      async function fetchDetroitWeather() {
        try {
          console.log("Fetching Detroit weather...");

          await fetchWeatherByCoords(
            DETROIT_COORDINATES.lat,
            DETROIT_COORDINATES.lon
          );
        } catch (error) {
          console.error("Error fetching Detroit weather:", error);
          updateWeatherWidget(null, "Failed to load weather data for Detroit");
        }
      }

      // Fetch weather by coordinates using Weather.gov API
      async function fetchWeatherByCoords(lat, lon) {
        try {
          // First, get the weather station for these coordinates
          const pointsResponse = await fetch(
            `${WEATHER_GOV_BASE_URL}/points/${lat.toFixed(4)},${lon.toFixed(4)}`
          );

          if (!pointsResponse.ok) {
            throw new Error(
              `Weather.gov points request failed: ${pointsResponse.status}`
            );
          }

          const pointsData = await pointsResponse.json();

          // Get the forecast URL from the points data
          const forecastUrl = pointsData.properties.forecast;

          // Fetch the forecast data
          const forecastResponse = await fetch(forecastUrl);

          if (!forecastResponse.ok) {
            throw new Error(
              `Weather.gov forecast request failed: ${forecastResponse.status}`
            );
          }

          const forecastData = await forecastResponse.json();

          // Get current conditions from the first period
          const currentPeriod = forecastData.properties.periods[0];

          updateWeatherWidget(currentPeriod);
        } catch (error) {
          console.error("Error fetching weather by coordinates:", error);
          updateWeatherWidget(null, "Weather service unavailable");
        }
      }

      // Update weather widget
      function updateWeatherWidget(weatherData, errorMessage = null) {
        if (errorMessage || !weatherData) {
          weatherWidget.innerHTML = `
                    <div class="weather-header">
                        <div class="weather-title">Current Weather</div>
                        <button class="weather-refresh" onclick="fetchDetroitWeather()">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    <div class="weather-location">Detroit, MI</div>
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Weather Unavailable</h3>
                        <p>${errorMessage || "Unable to load weather data"}</p>
                        <button class="retry-btn" onclick="fetchDetroitWeather()">
                            <i class="fas fa-redo"></i>
                            Try Again
                        </button>
                    </div>
                `;
          return;
        }

        // Update weather icon based on condition
        const condition = weatherData.shortForecast.toLowerCase();
        let iconClass = "fas fa-cloud";

        for (const [key, value] of Object.entries(weatherIcons)) {
          if (condition.includes(key)) {
            iconClass = value;
            break;
          }
        }

        // Extract wind speed and direction
        const windInfo = weatherData.windSpeed || "N/A";
        const humidity = "N/A"; // Weather.gov doesn't provide humidity in this endpoint

        weatherWidget.innerHTML = `
                <div class="weather-header">
                    <div class="weather-title">Current Weather</div>
                    <button class="weather-refresh" onclick="fetchDetroitWeather()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div class="weather-location">Detroit, MI</div>
                <div class="weather-main">
                    <div class="weather-icon">
                        <i class="${iconClass}"></i>
                    </div>
                    <div class="weather-temp">${weatherData.temperature}°${
          weatherData.temperatureUnit
        }</div>
                </div>
                <div class="weather-condition">${
                  weatherData.shortForecast
                }</div>
                <div class="weather-details">
                    <div class="weather-detail">
                        <i class="fas fa-wind"></i>
                        <span>Wind</span>
                        <strong>${windInfo}</strong>
                    </div>
                    <div class="weather-detail">
                        <i class="fas fa-compass"></i>
                        <span>Direction</span>
                        <strong>${weatherData.windDirection || "N/A"}</strong>
                    </div>
                    <div class="weather-detail">
                        <i class="fas fa-tint"></i>
                        <span>Humidity</span>
                        <strong>${humidity}</strong>
                    </div>
                    <div class="weather-detail">
                        <i class="fas fa-eye"></i>
                        <span>Forecast</span>
                        <strong>${
                          weatherData.isDaytime ? "Day" : "Night"
                        }</strong>
                    </div>
                </div>
            `;
      }

      // Initialize the dashboard when the page loads
      document.addEventListener("DOMContentLoaded", initDashboard);
    </script>
  </body>
</html>
